<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS Cloud + Private Chat</title>
    <style>
        /* Ваши существующие стили + дополнения для чата */
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(226, 232, 240, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #eef2ff, #f1f5f9);
            display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0;
        }

        .auth-bar, .container, .sort-box, .chat-container {
            width: 100%; max-width: 450px; margin-bottom: 15px; box-sizing: border-box;
        }

        .auth-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 20px; background: var(--glass); border-radius: 20px; backdrop-filter: blur(10px); 
        }

        .hidden { display: none !important; }

        /* Стили чата */
        .chat-container {
            background: var(--glass); border-radius: 28px; border: 1px solid white;
            padding: 20px; backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .user-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; }
        .user-card { 
            min-width: 60px; text-align: center; cursor: pointer; font-size: 10px; opacity: 0.6; transition: 0.3s;
        }
        .user-card.active { opacity: 1; transform: scale(1.1); font-weight: bold; }
        .user-card img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); }

        .chat-window { 
            height: 300px; overflow-y: auto; border: 1px solid var(--border); 
            border-radius: 15px; padding: 10px; background: white; margin-bottom: 10px;
            display: flex; flex-direction: column; gap: 8px;
        }

        .msg { max-width: 80%; padding: 8px 12px; border-radius: 15px; font-size: 14px; position: relative; }
        .msg.sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: #e2e8f0; color: #1e293b; border-bottom-left-radius: 2px; }

        .chat-input-group { display: flex; gap: 8px; }
        .chat-input-group input { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); }
        .chat-input-group button { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 10px; cursor: pointer; }

        /* Остальные ваши стили для постов... */
        .post { background: white; padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        .post img { width: 100%; border-radius: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="auth-bar">
        <div id="userInfo"><span>Войдите для работы</span></div>
        <button id="loginBtn" style="background:#6366f1; color:white; border:none; padding:8px 15px; border-radius:10px; cursor:pointer;">Войти</button>
        <button id="logoutBtn" class="hidden" style="background:#fee2e2; color:#ef4444; border:none; padding:8px 15px; border-radius:10px;">Выйти</button>
    </div>

    <div id="chatSection" class="chat-container hidden">
        <h3 style="margin-top:0; color:var(--primary)">Личные сообщения</h3>
        <div class="user-list" id="userList">
            </div>
        <div id="chatWithTitle" style="font-size: 12px; margin-bottom: 5px; color: #64748b;">Выберите собеседника</div>
        <div class="chat-window" id="chatWindow">
            <div style="text-align:center; color:#cbd5e1; margin-top:100px;">Здесь будет переписка</div>
        </div>
        <div class="chat-input-group">
            <input type="text" id="chatInput" placeholder="Напишите сообщение...">
            <button id="sendChatBtn">🚀</button>
        </div>
    </div>

    <div class="container hidden" id="postForm">
        <h3>Новая запись</h3>
        <input type="text" id="name" placeholder="Ваше имя (отобразится в чате)">
        <input type="text" id="imageUrlInput" placeholder="URL изображения">
        <button id="mainBtn" style="background:var(--primary); color:white; width:100%; padding:12px; border-radius:12px; margin-top:10px;">Опубликовать</button>
    </div>

    <div id="feed" style="width:100%; max-width:450px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where, or, and } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6-WsTIti1eJ4XIwAZFy545cKtXQRxW-w",
            authDomain: "project1-930e4.firebaseapp.com",
            projectId: "project1-930e4",
            storageBucket: "project1-930e4.firebasestorage.app",
            messagingSenderId: "752357361184",
            appId: "1:752357361184:web:4fa4b101ccb3184e339e45"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let selectedUserId = null;
        let chatUnsubscribe = null;

        // --- АВТОРИЗАЦИЯ ---
        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('chatSection').classList.remove('hidden');
                document.getElementById('postForm').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userInfo').innerHTML = `<b>${user.displayName}</b>`;
                loadUsers(); 
            } else {
                location.reload(); // Простой сброс при выходе
            }
        });

        // --- ЛОГИКА ЧАТА ---

        // 1. Загрузка списка пользователей (берем авторов постов)
        function loadUsers() {
            const q = query(collection(db, "requests"));
            onSnapshot(q, (snapshot) => {
                const userList = document.getElementById('userList');
                userList.innerHTML = "";
                const uniqueUsers = {};
                
                snapshot.docs.forEach(doc => {
                    const data = doc.data();
                    if (data.uid !== auth.currentUser.uid) {
                        uniqueUsers[data.uid] = { name: data.name, photo: data.imageUrl || 'https://placehold.co/40x40' };
                    }
                });

                for (let uid in uniqueUsers) {
                    const div = document.createElement('div');
                    div.className = `user-card ${selectedUserId === uid ? 'active' : ''}`;
                    div.innerHTML = `<img src="${uniqueUsers[uid].photo}"><br>${uniqueUsers[uid].name}`;
                    div.onclick = () => selectUser(uid, uniqueUsers[uid].name);
                    userList.appendChild(div);
                }
            });
        }

        // 2. Выбор собеседника
        function selectUser(uid, name) {
            selectedUserId = uid;
            document.getElementById('chatWithTitle').innerText = `Чат с: ${name}`;
            loadMessages(uid);
            loadUsers(); // Перерисовать активный класс
        }

        // 3. Загрузка сообщений
        function loadMessages(otherUid) {
            if (chatUnsubscribe) chatUnsubscribe();
            
            const myUid = auth.currentUser.uid;
            // Фильтр: (от меня к нему) ИЛИ (от него ко мне)
            const q = query(
                collection(db, "messages"),
                orderBy("timestamp", "asc")
            );

            chatUnsubscribe = onSnapshot(q, (snapshot) => {
                const chatWindow = document.getElementById('chatWindow');
                chatWindow.innerHTML = "";
                
                snapshot.docs.forEach(doc => {
                    const m = doc.data();
                    // Фильтруем сообщения только для текущей пары пользователей
                    const isMyMessage = m.sender === myUid && m.receiver === otherUid;
                    const isTheirMessage = m.sender === otherUid && m.receiver === myUid;

                    if (isMyMessage || isTheirMessage) {
                        const div = document.createElement('div');
                        div.className = `msg ${isMyMessage ? 'sent' : 'received'}`;
                        div.innerText = m.text;
                        chatWindow.appendChild(div);
                    }
                });
                chatWindow.scrollTop = chatWindow.scrollHeight;
            });
        }

        // 4. Отправка сообщения
        document.getElementById('sendChatBtn').onclick = async () => {
            const text = document.getElementById('chatInput').value;
            if (!text || !selectedUserId) return alert("Выберите пользователя и введите текст!");

            await addDoc(collection(db, "messages"), {
                sender: auth.currentUser.uid,
                receiver: selectedUserId,
                text: text,
                timestamp: serverTimestamp()
            });
            document.getElementById('chatInput').value = "";
        };

        // --- ВАША ЛОГИКА ПОСТОВ (Упрощенная для примера) ---
        document.getElementById('mainBtn').onclick = async () => {
            const name = document.getElementById('name').value;
            const url = document.getElementById('imageUrlInput').value;
            if(!name) return;
            await addDoc(collection(db, "requests"), {
                name, imageUrl: url, uid: auth.currentUser.uid, timestamp: serverTimestamp(), likes: 0
            });
            alert("Пост создан! Теперь вы появитесь в списке контактов у других.");
        };

        // Отображение ленты
        onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (snap) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "<h3>Лента постов</h3>";
            snap.docs.forEach(docSnap => {
                const data = docSnap.data();
                feed.innerHTML += `
                    <div class="post">
                        <b>${data.name}</b>
                        ${data.imageUrl ? `<img src="${data.imageUrl}">` : ''}
                    </div>`;
            });
        });

    </script>
</body>
</html>
