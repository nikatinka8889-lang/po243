<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS Cloud Dashboard + Enhanced Security</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(226, 232, 240, 0.8);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #eef2ff, #f1f5f9);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
            margin: 0;
        }

        .auth-bar {
            width: 100%; max-width: 450px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 20px; padding: 10px 20px;
            background: var(--glass); border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid white;
        }

        .user-info { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; }
        .user-info img { width: 32px; height: 32px; border-radius: 50%; }

        .container {
            width: 100%; max-width: 450px; background: var(--glass); backdrop-filter: blur(12px);
            padding: 30px; border-radius: 28px; border: 1px solid white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); margin-bottom: 15px; box-sizing: border-box;
        }

        .hidden { display: none !important; }
        h3 { margin: 0 0 20px 0; font-size: 1.5rem; font-weight: 800; text-align: center; color: var(--primary); }

        input, .file-input {
            width: 100%; padding: 12px 16px; margin: 8px 0; border: 1px solid var(--border);
            border-radius: 12px; background: white; font-size: 14px; box-sizing: border-box;
        }

        button { cursor: pointer; border-radius: 12px; font-weight: 700; transition: 0.3s; border: none; }

        #mainBtn, #loginBtn {
            background: var(--primary); color: white; padding: 14px; width: 100%;
            box-shadow: 0 8px 15px -5px rgba(99, 102, 241, 0.4);
        }

        #logoutBtn { background: #fee2e2; color: #ef4444; padding: 6px 12px; font-size: 12px; }

        .sort-box { display: flex; gap: 10px; width: 100%; max-width: 450px; margin-bottom: 20px; }
        .sort-btn { flex: 1; padding: 10px; background: white; color: var(--text-muted); border: 1px solid var(--border); }
        .sort-btn.active { background: var(--primary); color: white; }

        .post {
            background: white; padding: 20px; margin-top: 15px; border-radius: 20px;
            width: 100%; max-width: 450px; border: 1px solid var(--border); position: relative;
            box-sizing: border-box;
        }
        .post img { width: 100%; border-radius: 12px; margin-top: 10px; max-height: 300px; object-fit: cover; }
        .time { font-size: 11px; color: var(--text-muted); position: absolute; top: 20px; right: 20px; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .like-btn { background: #f1f5f9; padding: 8px 16px; font-size: 13px; }
        
        .divider { text-align: center; margin: 10px 0; font-size: 12px; color: var(--text-muted); position: relative; }
        .divider::before { content: ""; position: absolute; width: 40%; height: 1px; background: var(--border); left: 0; top: 50%; }
        .divider::after { content: ""; position: absolute; width: 40%; height: 1px; background: var(--border); right: 0; top: 50%; }
    </style>
</head>
<body>

    <div class="auth-bar">
        <div id="userInfo" class="user-info">
            <span>Вы не вошли</span>
        </div>
        <button id="loginBtn">Войти через Google</button>
        <button id="logoutBtn" class="hidden">Выйти</button>
    </div>

    <div class="container hidden" id="postForm">
        <h3>Новая запись</h3>
        <input type="text" id="name" placeholder="Заголовок/Имя">
        <input type="email" id="email" placeholder="Контактная почта">
        
        <div style="margin-top: 10px;">
            <label style="font-size: 12px; color: var(--text-muted);">Способ добавления фото:</label>
            <input type="file" id="imageFile" accept="image/*" class="file-input">
            <div class="divider">ИЛИ</div>
            <input type="text" id="imageUrlInput" placeholder="Вставьте прямую ссылку на фото (URL)">
        </div>

        <button id="mainBtn">Опубликовать</button>
    </div>

    <div class="sort-box">
        <input type="text" id="searchInput" placeholder="🔍 Поиск..." style="flex: 2; margin: 0;">
        <button class="sort-btn active" id="btnNew">🕒 Новые</button>
        <button class="sort-btn" id="btnHot">🔥 ТОП</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 450px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6-WsTIti1eJ4XIwAZFy545cKtXQRxW-w",
            authDomain: "project1-930e4.firebaseapp.com",
            projectId: "project1-930e4",
            storageBucket: "project1-930e4.firebasestorage.app",
            messagingSenderId: "752357361184",
            appId: "1:752357361184:web:4fa4b101ccb3184e339e45"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        // --- ЗАЩИТА КОНСОЛИ ---
        // Эти функции доступны глобально, но теперь они проверяют auth ПЕРЕД запросом
        window.processLike = async (id) => {
            if (!auth.currentUser) return alert("Консольная атака заблокирована: Войдите в аккаунт!");
            try {
                await updateDoc(doc(db, "requests", id), { likes: increment(1) });
            } catch (e) { console.error("Ошибка доступа:", e.message); }
        };

        window.deletePost = async (id) => {
            if (!auth.currentUser) return alert("Консольная атака заблокирована: У вас нет прав!");
            if (!confirm("Удалить запись?")) return;
            try {
                await deleteDoc(doc(db, "requests", id));
            } catch (e) { console.error("Ошибка доступа:", e.message); }
        };

        // --- АВТОРИЗАЦИЯ ---
        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const elements = {
                form: document.getElementById('postForm'),
                login: document.getElementById('loginBtn'),
                logout: document.getElementById('logoutBtn'),
                info: document.getElementById('userInfo')
            };

            if (user) {
                elements.form.classList.remove('hidden');
                elements.login.classList.add('hidden');
                elements.logout.classList.remove('hidden');
                elements.info.innerHTML = `<img src="${user.photoURL}"> <span>${user.displayName}</span>`;
            } else {
                elements.form.classList.add('hidden');
                elements.login.classList.remove('hidden');
                elements.logout.classList.add('hidden');
                elements.info.innerHTML = `<span>Войдите для записи</span>`;
            }
        });

        // --- ПУБЛИКАЦИЯ ---
        document.getElementById('mainBtn').onclick = async () => {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const file = document.getElementById('imageFile').files[0];
            const manualUrl = document.getElementById('imageUrlInput').value;
            
            if(!name || !email) return alert("Заполните имя и почту!");
            
            document.getElementById('mainBtn').disabled = true;
            document.getElementById('mainBtn').innerText = "Публикация...";

            try {
                let finalImageUrl = manualUrl; // Сначала берем URL из поля

                // Если выбран файл, он в приоритете (загружаем в Storage)
                if (file) {
                    const storageRef = ref(storage, `images/${Date.now()}_${file.name}`);
                    await uploadBytes(storageRef, file);
                    finalImageUrl = await getDownloadURL(storageRef);
                }

                await addDoc(collection(db, "requests"), {
                    name, email, 
                    imageUrl: finalImageUrl, 
                    likes: 0, 
                    timestamp: serverTimestamp(),
                    uid: auth.currentUser.uid
                });

                // Очистка
                ['name', 'email', 'imageFile', 'imageUrlInput'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el.type === 'file') el.value = null; else el.value = "";
                });

            } catch (e) {
                alert("Ошибка! Проверьте авторизацию или консоль.");
                console.error(e);
            }
            document.getElementById('mainBtn').disabled = false;
            document.getElementById('mainBtn').innerText = "Опубликовать";
        };

        // --- ЛЕНТА ---
        let currentDocs = [];
        let unsubscribe = null;

        function startSync(sortField) {
            if (unsubscribe) unsubscribe();
            const q = query(collection(db, "requests"), orderBy(sortField, "desc"));
            unsubscribe = onSnapshot(q, (snapshot) => {
                currentDocs = snapshot.docs;
                renderFeed(document.getElementById('searchInput').value.toLowerCase());
            });
        }

        function renderFeed(filter = "") {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            currentDocs.forEach((docSnap) => {
                const data = docSnap.data();
                if (data.name.toLowerCase().includes(filter)) {
                    feed.innerHTML += `
                        <div class="post">
                            <span class="time">${data.timestamp?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || '...'}</span>
                            <b>${data.name}</b>
                            <p>${data.email}</p>
                            ${data.imageUrl ? `<img src="${data.imageUrl}" onerror="this.src='https://placehold.co/400x200?text=Ошибка+URL'">` : ''}
                            <div class="btn-group">
                                <button class="like-btn" onclick="window.processLike('${docSnap.id}')">👍 ${data.likes || 0}</button>
                                <button class="like-btn" style="color:#ef4444" onclick="window.deletePost('${docSnap.id}')">🗑️ Удалить</button>
                            </div>
                        </div>
                    `;
                }
            });
        }

        document.getElementById('btnNew').onclick = () => { startSync("timestamp"); toggleActive('btnNew'); };
        document.getElementById('btnHot').onclick = () => { startSync("likes"); toggleActive('btnHot'); };
        document.getElementById('searchInput').oninput = (e) => renderFeed(e.target.value.toLowerCase());

        function toggleActive(id) {
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        startSync("timestamp");
    </script>
</body>
</html>
